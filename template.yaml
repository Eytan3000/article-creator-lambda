AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Article Creator Lambda - OpenAI to Sanity

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key
  SanityApiToken:
    Type: String
    NoEcho: true
    Description: Sanity API token (with write access)

Resources:
  ArticleCreatorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: article-creator
      Runtime: nodejs20.x
      Handler: dist/index.handler
      CodeUri: .
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          SANITY_API_TOKEN: !Ref SanityApiToken
      MemorySize: 256
      Timeout: 60

Outputs:
  ArticleCreatorFunctionArn:
    Description: Article Creator Lambda ARN
    Value: !GetAtt ArticleCreatorFunction.Arn
